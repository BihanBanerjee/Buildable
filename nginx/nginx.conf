events {
    worker_connections 1024;
}

http {
    # ── Upstream (FastAPI runs on host, not in Docker) ──
    upstream fastapi {
        server 172.17.0.1:8000;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name api.buildable.bihanbanerjee.com;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──
    server {
        listen 443 ssl;
        server_name api.buildable.bihanbanerjee.com;

        # ── SSL certificates (managed by Certbot) ──
        ssl_certificate     /etc/letsencrypt/live/api.buildable.bihanbanerjee.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.buildable.bihanbanerjee.com/privkey.pem;

        # ── SSL hardening ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── API routes → FastAPI ──
        location / {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support — critical for streaming agent events
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # ── Health check ──
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
